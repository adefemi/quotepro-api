name: quotepro-api

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-quotepro}
      POSTGRES_USER: ${POSTGRES_USER:-quotepro}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-quotepro}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - quotepro_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-quotepro}:${POSTGRES_PASSWORD:-quotepro}@postgres:5432/${POSTGRES_DB:-quotepro}
    depends_on:
      postgres:
        condition: service_healthy
    command: ["pnpm", "migrate:prod"]
    restart: "no"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      API_HOST: 0.0.0.0
      API_PORT: 4000
      DATABASE_URL: postgres://${POSTGRES_USER:-quotepro}:${POSTGRES_PASSWORD:-quotepro}@postgres:5432/${POSTGRES_DB:-quotepro}
      APP_PUBLIC_URL: ${APP_PUBLIC_URL:-http://localhost:3000}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:4000}
      MOCK_PAYMENTS: ${MOCK_PAYMENTS:-true}
      PAYSTACK_SECRET_KEY: ${PAYSTACK_SECRET_KEY:-}
      PAYSTACK_WEBHOOK_SECRET: ${PAYSTACK_WEBHOOK_SECRET:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_QUOTE_MODEL: ${OPENAI_QUOTE_MODEL:-gpt-5-nano}
      OPENAI_QUOTE_FALLBACK_MODEL: ${OPENAI_QUOTE_FALLBACK_MODEL:-gpt-4.1-mini}
      OPENAI_REQUEST_TIMEOUT_MS: ${OPENAI_REQUEST_TIMEOUT_MS:-8000}
      S3_REGION: ${S3_REGION:-}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_PUBLIC_BASE_URL: ${S3_PUBLIC_BASE_URL:-}
    ports:
      - "${API_PUBLIC_PORT:-4000}:4000"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  quotepro_postgres_data:
