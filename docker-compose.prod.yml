services:
  postgres:
    ports: !reset []

  api:
    ports:
      - "${API_PUBLIC_PORT:-4000}:4000"
    environment:
      APP_PUBLIC_URL: ${APP_PUBLIC_URL}
      CORS_ORIGINS: ${CORS_ORIGINS}
      MOCK_PAYMENTS: ${MOCK_PAYMENTS:-false}
      PAYSTACK_SECRET_KEY: ${PAYSTACK_SECRET_KEY}
      PAYSTACK_WEBHOOK_SECRET: ${PAYSTACK_WEBHOOK_SECRET:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_QUOTE_MODEL: ${OPENAI_QUOTE_MODEL:-gpt-5-nano}
      OPENAI_QUOTE_FALLBACK_MODEL: ${OPENAI_QUOTE_FALLBACK_MODEL:-gpt-4.1-mini}
      OPENAI_REQUEST_TIMEOUT_MS: ${OPENAI_REQUEST_TIMEOUT_MS:-8000}
      S3_REGION: ${S3_REGION:-}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_PUBLIC_BASE_URL: ${S3_PUBLIC_BASE_URL:-}
